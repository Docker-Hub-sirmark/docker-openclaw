name: OpenClaw Docker Build and Push

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-matrix:
    if: |
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, 'dependabot[bot]')
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          MATRIX_JSON=$(yq eval -o=json '{"include": .}' ci-matrix.yaml | jq -c .)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
  build:
    if: |
      github.actor != 'dependabot[bot]' &&
      !contains(github.event.head_commit.message, 'dependabot[bot]')
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix_json) }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: openclaw/openclaw
          ref: ${{ matrix.version }}
          path: openclaw
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ matrix.docker-repo }}
          tags: ${{ matrix.tags }}

      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          docker-images: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name ==  'push' }}
          build-args: ${{ matrix.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: ${{ matrix.docker-repo }}
