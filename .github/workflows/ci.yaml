name: OpenClaw Docker Build and Push

permissions:
  contents: read
  packages: write

on:
  # push:
  #   branches:
  #     - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  build:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
#VERSIONS
          - name: openclaw-v2026.3.28-bookworm
            version: v2026.3.28
            context: ./openclaw
            platforms: linux/amd64,linux/arm64
            build-args: |
              OPENCLAW_VARIANT=default
            tags: |
              2026.3.28-bookworm
              bookworm
          - name: openclaw-v2026.3.28-slim-bookworm
            version: v2026.3.28
            context: ./openclaw
            platforms: linux/amd64,linux/arm64
            build-args: |
              OPENCLAW_VARIANT=slim
            tags: |
              latest
              2026.3.28
              2026.3.28-slim
              2026.3.28-slim-bookworm
              slim-bookworm
              slim
#VERSIONS
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: openclaw/openclaw
          ref: ${{ matrix.version }}
          path: openclaw/openclaw
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            sirmark/openclaw
          tags: ${{ matrix.tags }}

      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          docker-images: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: docker/build-push-action@v7
        if: github.event_name != 'pull_request'
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ matrix.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: sirmark/openclaw
